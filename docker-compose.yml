name: gal-atelier-os

services:
  postgres:
    image: postgres:16-alpine
    container_name: gal-atelier-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: galatelier
      POSTGRES_PASSWORD: galatelier123
      POSTGRES_DB: galatelier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gal-atelier-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galatelier"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  backend:
    build:
      context: ./backend
    container_name: gal-atelier-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "jdbc:postgresql://postgres:5432/galatelier"
      DATABASE_USERNAME: galatelier
      DATABASE_PASSWORD: galatelier123
      WHATSAPP_RECEIVER: "5511914136961"
      PIX_KEY: "coloque-a-chave-pix-real-no-env-local"
      PIX_MERCHANT_NAME: "GAL ATELIER"
      PIX_MERCHANT_CITY: "SAO PAULO"
      PROFILE: "prod"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 35s
    networks:
      - gal-atelier-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://backend:8080"
        NEXT_PUBLIC_WHATSAPP_RECEIVER: "5511914136961"
    container_name: gal-atelier-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://backend:8080"
      NEXT_PUBLIC_WHATSAPP_RECEIVER: "5511914136961"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gal-atelier-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  gal-atelier-net:
    driver: bridge