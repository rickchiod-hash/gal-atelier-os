server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: gal-atelier-backend
  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/galatelier}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.galatelier: INFO
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"

galatelier:
  whatsappReceiver: ${WHATSAPP_RECEIVER:5511914136961}
  pixKey: ${PIX_KEY:chave-pix-exemplo}
  pixMerchantName: ${PIX_MERCHANT_NAME:GAL ATELIER}
  pixMerchantCity: ${PIX_MERCHANT_CITY:SAO PAULO}
  aiProvider: ${AI_PROVIDER:mock}