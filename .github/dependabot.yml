version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    labels:
      - dependencies
      - github-actions
      - ci-cd
    commit-message:
      prefix: "chore(deps-actions)"
      include: scope
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      github-actions-major:
        patterns:
          - "*"
        update-types:
          - major
    cooldown:
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 0
    open-pull-requests-limit: 5
    rebase-strategy: auto

  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: America/Sao_Paulo
    labels:
      - dependencies
      - java
      - backend
    commit-message:
      prefix: "chore(deps-backend)"
      prefix-development: "chore(deps-dev-backend)"
      include: scope
    versioning-strategy: increase-if-necessary
    groups:
      maven-production-minor-patch:
        dependency-type: production
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      maven-development-minor-patch:
        dependency-type: development
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      maven-major:
        patterns:
          - "*"
        update-types:
          - major
    cooldown:
      semver-major-days: 21
      semver-minor-days: 7
      semver-patch-days: 1
    open-pull-requests-limit: 5
    rebase-strategy: auto

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    labels:
      - dependencies
      - javascript
      - frontend
    commit-message:
      prefix: "chore(deps-frontend)"
      prefix-development: "chore(deps-dev-frontend)"
      include: scope
    versioning-strategy: increase-if-necessary
    groups:
      npm-production-minor-patch:
        dependency-type: production
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      npm-development-minor-patch:
        dependency-type: development
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      npm-major:
        patterns:
          - "*"
        update-types:
          - major
    cooldown:
      semver-major-days: 21
      semver-minor-days: 7
      semver-patch-days: 1
    open-pull-requests-limit: 5
    rebase-strategy: auto
