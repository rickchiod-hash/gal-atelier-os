name: CI

on:
  push:
    branches:
      - feature/**
      - develop
      - release/**
      - main
  pull_request:
    branches:
      - develop
      - release/**
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: galatelier
          POSTGRES_PASSWORD: galatelier123
          POSTGRES_DB: galatelier
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build & Test
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/galatelier
          DATABASE_USERNAME: galatelier
          DATABASE_PASSWORD: galatelier123
        run: mvn -B -U clean verify

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/*.xml
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: 'http://localhost:8080'
          NEXT_PUBLIC_WHATSAPP_RECEIVER: '5511914136961'
        run: npm run build

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/coverage
          retention-days: 7

  docker-compose:
    name: Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate
        run: docker compose config

  summary:
    name: Summary
    needs: [backend, frontend, docker-compose]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Compose | ${{ needs.docker-compose.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.backend.result }}" != "success" ] || [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ CI failed. Please review the failures above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi