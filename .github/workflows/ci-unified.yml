name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - release/**
      - main
      - feature/**
  pull_request:
    branches:
      - develop
      - release/**
      - main
    types: [opened, synchronize, reopened]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ============================================
  # UNIFIED CHECKS - All in one job
  # ============================================
  unified-checks:
    name: 🔍 CI/CD Pipeline • ${{ github.sha }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: galatelier
          POSTGRES_PASSWORD: galatelier123
          POSTGRES_DB: galatelier
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    outputs:
      backend-status: ${{ steps.backend-check.result }}
      frontend-status: ${{ steps.frontend-check.result }}
      security-status: ${{ steps.security-check.result }}

    steps:
      # ----------------------------------------
      # 1. Setup & Info
      # ----------------------------------------
      - name: 📋 Pipeline Information
        id: info
        run: |
          echo "============================================"
          echo "🔍 CI/CD Pipeline"
          echo "============================================"
          echo "📌 Branch: ${{ github.ref_name }}"
          echo "📌 Commit: ${{ github.sha }}"
          echo "📌 Event: ${{ github.event_name }}"
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            echo "📌 PR: #${{ github.event.pull_request.number }}"
          fi
          echo "📌 Run ID: ${{ github.run_id }}"
          echo "============================================"

      - name: 📥 Checkout Code
        uses: actions/checkout@v6

      # ----------------------------------------
      # 2. Wait for PostgreSQL
      # ----------------------------------------
      - name: ⏳ Wait for PostgreSQL
        run: |
          echo "⏳ Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U galatelier; then
              echo "✅ PostgreSQL is ready!"
              break
            fi
            echo "⏳ Attempt $i/30: PostgreSQL not ready yet..."
            sleep 2
          done
          # Verify connection
          PGPASSWORD=galatelier123 psql -h localhost -p 5432 -U galatelier -d galatelier -c "SELECT version();" || {
            echo "❌ Failed to connect to PostgreSQL"
            exit 1
          }
          echo "✅ PostgreSQL connection verified"

      # ----------------------------------------
      # 3. Backend Lint & Test
      # ----------------------------------------
      - name: ☕ Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'corretto'
          cache: maven

      - name: 🔍 Backend Lint (SpotBugs)
        id: backend-lint
        working-directory: backend
        run: |
          echo "============================================"
          echo "🔍 Running SpotBugs Static Analysis"
          echo "============================================"
          mvn spotbugs:check -q
          echo "✅ SpotBugs: PASSED"
          echo "============================================"

      - name: ✅ Backend Tests
        id: backend-test
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/galatelier
          DATABASE_USERNAME: galatelier
          DATABASE_PASSWORD: galatelier123
        run: |
          echo "============================================"
          echo "✅ Running Backend Tests"
          echo "============================================"
          mvn test -q
          echo "✅ Tests: PASSED"
          echo "============================================"

      - name: 📊 Backend Coverage
        id: backend-coverage
        working-directory: backend
        run: |
          echo "============================================"
          echo "📊 Generating JaCoCo Coverage Report"
          echo "============================================"
          mvn jacoco:report -q
          if [ -f "target/site/jacoco/jacoco.xml" ]; then
            echo "✅ Coverage report generated"
          else
            echo "⚠️ Coverage report not found"
          fi
          echo "============================================"

      - name: 📈 Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./backend/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
        continue-on-error: true

      # ----------------------------------------
      # 4. Frontend Lint & Build
      # ----------------------------------------
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install Frontend Dependencies
        working-directory: frontend
        run: |
          echo "============================================"
          echo "📥 Installing Frontend Dependencies"
          echo "============================================"
          npm ci
          echo "✅ Dependencies installed"
          echo "============================================"

      - name: 🔍 Frontend Lint
        id: frontend-lint
        working-directory: frontend
        run: |
          echo "============================================"
          echo "🔍 Running ESLint"
          echo "============================================"
          npm run lint
          echo "✅ Lint: PASSED"
          echo "============================================"

      - name: 🏗️ Frontend Build
        id: frontend-build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: 'http://localhost:8080'
          NEXT_PUBLIC_WHATSAPP_RECEIVER: '5511914136961'
        run: |
          echo "============================================"
          echo "🏗️ Building Frontend"
          echo "============================================"
          npm run build
          if [ -d ".next" ]; then
            echo "✅ Build successful - .next directory exists"
          else
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi
          echo "============================================"

      # ----------------------------------------
      # 5. Security Scan
      # ----------------------------------------
      - name: 🔒 Security Scan
        id: security-check
        continue-on-error: true
        run: |
          echo "============================================"
          echo "🔒 Running Security Scans"
          echo "============================================"
          echo "📦 Frontend NPM Audit..."
          cd frontend && npm audit --audit-level=moderate || true
          echo "✅ Security scans completed"
          echo "============================================"

      # ----------------------------------------
      # 6. Docker Build (only on push)
      # ----------------------------------------
      - name: 🐳 Setup Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Login to Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build & Push Backend
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache,mode=max

      - name: 🏗️ Build & Push Frontend
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://backend:8080
            NEXT_PUBLIC_WHATSAPP_RECEIVER=5511914136961
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:buildcache,mode=max

      # ----------------------------------------
      # 7. Summary
      # ----------------------------------------
      - name: 📊 Pipeline Summary
        if: always()
        run: |
          echo "============================================"
          echo "📊 Pipeline Summary"
          echo "============================================"
          echo "| Check | Status |"
          echo "|-------|--------|"
          echo "| Backend Lint | ${{ steps.backend-lint.result }} |"
          echo "| Backend Tests | ${{ steps.backend-test.result }} |"
          echo "| Backend Coverage | ${{ steps.backend-coverage.result }} |"
          echo "| Frontend Lint | ${{ steps.frontend-lint.result }} |"
          echo "| Frontend Build | ${{ steps.frontend-build.result }} |"
          echo "| Security Scan | ${{ steps.security-check.result }} |"
          echo "============================================"

          # Set step summary
          echo "## CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Lint | ${{ steps.backend-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ steps.backend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Coverage | ${{ steps.backend-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint | ${{ steps.frontend-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ steps.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ steps.security-check.result }} |" >> $GITHUB_STEP_SUMMARY

          # Fail if any critical check failed
          if [ "${{ steps.backend-test.result }}" == "failure" ] || [ "${{ steps.frontend-build.result }}" == "failure" ]; then
            echo ""
            echo "❌ Pipeline FAILED - Please fix the issues above"
            exit 1
          fi

          echo ""
          echo "✅ All Checks PASSED"

  # ============================================
  # NOTIFICATION
  # ============================================
  notify:
    name: 📢 Notification
    needs: unified-checks
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📢 Send Slack Notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "text": "🚀 Gal Atelier CI/CD Pipeline",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*CI/CD Pipeline*\nBranch: ${{ github.ref_name }}\nStatus: ${{ needs.unified-checks.result }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"},
                    {"type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}"}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: ℹ️ Skip Notification
        if: secrets.SLACK_WEBHOOK_URL == ''
        run: echo "SLACK_WEBHOOK_URL not configured, skipping notification"
