name: Docker Build

on:
  push:
    branches:
      - dev
      - develop
      - homol
      - homolog
      - master
      - main
    paths:
      - backend/**
      - frontend/**
      - docker-compose.yml
      - Dockerfile
      - .github/workflows/docker-build.yml
  pull_request:
    branches:
      - dev
      - develop
      - homol
      - homolog
      - master
      - main
    paths:
      - backend/**
      - frontend/**
      - docker-compose.yml
      - Dockerfile

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

permissions:
  contents: read

jobs:
  docker-compose-validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose
        run: docker compose config

  docker-backend:
    name: Backend Image
    runs-on: ubuntu-latest
    needs: docker-compose-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        run: docker build ./backend --tag gal-atelier-backend:ci

  docker-frontend:
    name: Frontend Image
    runs-on: ubuntu-latest
    needs: docker-compose-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        run: |
          docker build ./frontend \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:8080 \
            --build-arg NEXT_PUBLIC_WHATSAPP_RECEIVER=5511914136961 \
            --tag gal-atelier-frontend:ci

  summary:
    name: Summary
    needs: [docker-backend, docker-frontend]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Summary
        run: |
          echo "## Docker Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.docker-backend.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.docker-frontend.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY