name: CI - DEVELOP Environment

on:
  push:
    branches:
      - develop
      - feature/**
  pull_request:
    branches:
      - develop

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-and-test-backend:
    name: Backend • Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: galatelier
          POSTGRES_PASSWORD: galatelier123
          POSTGRES_DB: galatelier
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ⏳ Wait for PostgreSQL
        run: |
          echo "⏳ Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U galatelier; then
              echo "✅ PostgreSQL is ready!"
              break
            fi
            echo "⏳ Attempt $i/30: PostgreSQL not ready yet..."
            sleep 2
          done
          # Verify connection
          PGPASSWORD=galatelier123 psql -h localhost -p 5432 -U galatelier -d galatelier -c "SELECT version();" || {
            echo "❌ Failed to connect to PostgreSQL"
            exit 1
          }
          echo "✅ PostgreSQL connection verified"

      - name: ☕ Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'corretto'
          cache: maven

      - name: 🔍 Lint Backend
        working-directory: backend
        run: mvn spotbugs:check -q

      - name: ✅ Test Backend
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/galatelier
          DATABASE_USERNAME: galatelier
          DATABASE_PASSWORD: galatelier123
        run: mvn test -q

      - name: 📊 Code Coverage
        working-directory: backend
        run: |
          echo "📊 Generating JaCoCo coverage report..."
          mvn jacoco:report -q
          # Verify report exists
          if [ -f "target/site/jacoco/jacoco.xml" ]; then
            echo "✅ Coverage report generated successfully"
            COVERAGE=$(grep -oP 'Line coverage: \K[0-9.]+' target/site/jacoco/index.html 2>/dev/null || echo "N/A")
            echo "📈 Line Coverage: $COVERAGE%"
          else
            echo "⚠️ Coverage report not found, skipping upload"
          fi

      - name: 📈 Upload Coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./backend/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  lint-and-test-frontend:
    name: Frontend • Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install Dependencies
        working-directory: frontend
        run: |
          echo "📥 Installing frontend dependencies..."
          npm ci
          echo "✅ Dependencies installed"

      - name: 🔍 Lint Frontend
        working-directory: frontend
        run: |
          echo "[lint] pwd=$(pwd)"
          echo "[lint] node=$(node -v) npm=$(npm -v)"
          echo "[lint] script=$(npm pkg get scripts.lint | tr -d '\"')"
          npm run lint

      - name: 🏗️ Build Frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: 'http://localhost:8080'
          NEXT_PUBLIC_WHATSAPP_RECEIVER: '5511914136961'
        run: |
          echo "🏗️ Building frontend for DEV..."
          npm run build
          # Verify build output
          if [ -d "frontend/.next" ]; then
            echo "✅ Build successful - .next directory exists"
          else
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi

  build-backend:
    name: Backend • Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test-backend
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔐 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build & Push Backend Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:dev-latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:dev-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:dev-buildcache,mode=max
          load: false

      - name: ✅ Verify Backend Image
        run: |
          echo "✅ Backend Docker image pushed successfully"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ github.repository }}/backend:dev-${{ github.sha }}"

  build-frontend:
    name: Frontend • Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test-frontend
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔐 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build & Push Frontend Image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://backend:8080
            NEXT_PUBLIC_WHATSAPP_RECEIVER=5511914136961
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:dev-latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:dev-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:dev-buildcache,mode=max
