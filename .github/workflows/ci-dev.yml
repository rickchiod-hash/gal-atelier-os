name: CI - DEV Environment

on:
  push:
    branches:
      - dev
      - feature/**
  pull_request:
    branches:
      - dev

env:
  REGISTRY: ghcr.io
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  lint-and-test-backend:
    name: Backend • Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: galatelier
          POSTGRES_PASSWORD: galatelier123
          POSTGRES_DB: galatelier
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ☕ Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'corretto'
          cache: maven

      - name: 🔍 Lint Backend
        working-directory: backend
        run: mvn spotbugs:check -q

      - name: ✅ Test Backend
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/galatelier
          DATABASE_USERNAME: galatelier
          DATABASE_PASSWORD: galatelier123
        run: mvn test -q

      - name: 📊 Code Coverage
        working-directory: backend
        run: mvn jacoco:report -q

      - name: 📈 Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  lint-and-test-frontend:
    name: Frontend • Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 Lint Frontend
        working-directory: frontend
        run: npm run lint

      - name: 🏗️ Build Frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: 'http://localhost:8080'
          NEXT_PUBLIC_WHATSAPP_RECEIVER: '5511914136961'
        run: npm run build

  build-backend:
    name: Backend • Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test-backend
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔐 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build & Push Backend Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:dev-latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:dev-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:dev-buildcache,mode=max

  build-frontend:
    name: Frontend • Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test-frontend
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔐 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build & Push Frontend Image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://backend:8080
            NEXT_PUBLIC_WHATSAPP_RECEIVER=5511914136961
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:dev-latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:dev-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:dev-buildcache,mode=max

  notify-slack:
    name: Slack • Notification
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend, lint-and-test-frontend, build-backend, build-frontend]
    if: always()

    steps:
      - name: 📢 Send Slack Notification
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "text": "🚀 Gal Atelier DEV CI Pipeline",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*DEV Environment Build*\n${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n<${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}|${{ github.ref_name }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

