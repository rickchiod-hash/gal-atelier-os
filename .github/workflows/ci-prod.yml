name: CI/CD - PRODUCTION Environment

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  verify-security:
    name: Security • Pre-deployment Verification
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔒 Check for Secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Verify Commits are Signed
        run: |
          echo "⚠️ Note: Verify all commits are GPG signed in production"

  lint-and-test-backend:
    name: Backend • Lint, Test & Coverage
    runs-on: ubuntu-latest
    needs: verify-security

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: galatelier
          POSTGRES_PASSWORD: galatelier123
          POSTGRES_DB: galatelier
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ☕ Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'corretto'
          cache: maven

      - name: 🔍 Code Quality Analysis
        working-directory: backend
        run: |
          echo "🔍 Running static analysis..."
          mvn spotbugs:check pmd:check -q

      - name: ✅ Run Full Test Suite
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/galatelier
          DATABASE_USERNAME: galatelier
          DATABASE_PASSWORD: galatelier123
        run: |
          echo "🧪 Running comprehensive tests..."
          mvn clean test -q
          echo "📊 Generating JaCoCo report..."
          mvn jacoco:report -q

      - name: 🎯 Enforce Coverage Threshold
        working-directory: backend
        run: |
          echo "🎯 Enforcing minimum 70% coverage for production..."
          mvn jacoco:check -q || exit 1

      - name: 📈 Upload Coverage Reports
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/target/site/jacoco/jacoco.xml
          flags: backend-production
          name: backend-prod-coverage
          fail_ci_if_error: true

  lint-and-test-frontend:
    name: Frontend • Lint, Test & Build
    runs-on: ubuntu-latest
    needs: verify-security

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 Strict Linting
        working-directory: frontend
        run: npm run lint -- --max-warnings 0

      - name: 🏗️ Production Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: 'https://api.gal-atelier.com'
          NEXT_PUBLIC_WHATSAPP_RECEIVER: '5511914136961'
          NODE_ENV: 'production'
        run: |
          echo "🏗️ Building for PRODUCTION..."
          npm run build
          echo "✅ Production build successful"

      - name: 📦 Verify Build Output
        working-directory: frontend
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Production build failed: .next directory not found"
            exit 1
          fi
          echo "✅ Build output verified"

  security-scan:
    name: Security • Comprehensive Scanning
    runs-on: ubuntu-latest
    needs: verify-security

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔒 NPM Audit (Frontend)
        working-directory: frontend
        run: |
          npm audit --audit-level=moderate || exit 1

      - name: ☕ Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'corretto'
          cache: maven

      - name: 🔒 OWASP Dependency Check
        working-directory: backend
        continue-on-error: false
        run: |
          echo "🔒 Running OWASP dependency check..."
          mvn org.owasp:dependency-check-maven:check -q

  build-backend-production:
    name: Backend • Build Docker (Production)
    runs-on: ubuntu-latest
    needs: lint-and-test-backend
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔐 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=prod-
            type=raw,value=prod-latest

      - name: 🏗️ Build & Push Backend (Production)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache,mode=max

  build-frontend-production:
    name: Frontend • Build Docker (Production)
    runs-on: ubuntu-latest
    needs: lint-and-test-frontend
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔐 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=prod-
            type=raw,value=prod-latest

      - name: 🏗️ Build & Push Frontend (Production)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.gal-atelier.com
            NEXT_PUBLIC_WHATSAPP_RECEIVER=5511914136961
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:buildcache,mode=max

  create-release:
    name: Release • Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-backend-production, build-frontend-production]
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📝 Generate Changelog
        id: changelog
        run: |
          echo "## 📝 Changes" >> CHANGELOG_TEMP.md
          git log $(git describe --tags --abbrev=0)..HEAD --oneline >> CHANGELOG_TEMP.md || echo "Initial release" >> CHANGELOG_TEMP.md
          cat CHANGELOG_TEMP.md

      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false

  deploy-production:
    name: Deploy • PRODUCTION Environment
    runs-on: ubuntu-latest
    needs: [build-backend-production, build-frontend-production, security-scan, create-release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    environment:
      name: production
      url: https://gal-atelier.com

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🚀 Deploy to Production
        run: |
          echo "🚀 Deploying to PRODUCTION..."
          echo "Backend Image: ${{ needs.build-backend-production.outputs.image-tag }}"
          echo "Frontend Image: ${{ needs.build-frontend-production.outputs.image-tag }}"
          echo "⚠️ Configure secrets.PROD_DEPLOY_HOST to enable actual deployment"

      - name: ✅ Verify Deployment
        run: |
          echo "✅ Deployment verification pending..."
          echo "Monitor: https://gal-atelier.com/api/health"

  notify-completion:
    name: Notification • Pipeline Complete
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()

    steps:
      - name: 📢 Slack Notification
        uses: slackapi/slack-github-action@v2
        with:
          payload: |
            {
              "text": "🚀 Gal Atelier PRODUCTION Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*PRODUCTION Deployment Complete*\n${{ job.status == 'success' && '✅ SUCCESS - LIVE' || '❌ FAILED' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Environment:*\nPRODUCTION"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\nmain"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Deployed By:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Release:*\nv${{ github.run_number }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|📊 View Pipeline>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: 📧 Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚀 Gal Atelier Production Deployment v${{ github.run_number }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "ci@gal-atelier.com"
          body: |
            Production deployment completed successfully!

            Release: v${{ github.run_number }}
            Commit: ${{ github.sha }}
            URL: https://gal-atelier.com

            Pipeline: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true

