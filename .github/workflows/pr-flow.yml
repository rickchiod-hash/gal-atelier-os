name: PR Flow

on:
  push:
    branches:
      - feature/**
      - develop
      - release/**

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-branch:
    if: github.event_name == 'workflow_dispatch'
    name: Detect
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.detect.outputs.source }}
      target: ${{ steps.detect.outputs.target }}
      is-feature: ${{ steps.detect.outputs.is_feature }}
    steps:
      - name: 🔍 Detect Branch Type
        id: detect
        run: |
          BRANCH=${{ github.ref_name }}
          echo "🔍 Detected branch: $BRANCH"
          echo "source=$BRANCH" >> $GITHUB_OUTPUT
          echo "is_feature=false" >> $GITHUB_OUTPUT

          if [[ "$BRANCH" == feature/* ]]; then
            # feature/** → develop (target)
            echo "target=develop" >> $GITHUB_OUTPUT
            echo "is_feature=true" >> $GITHUB_OUTPUT
            echo "📋 Flow: feature/* → develop"
          elif [[ "$BRANCH" == "develop" ]]; then
            # develop → release (target)
            echo "target=release" >> $GITHUB_OUTPUT
            echo "📋 Flow: develop → release"
          elif [[ "$BRANCH" == release/* ]]; then
            # release/** → main (target)
            echo "target=main" >> $GITHUB_OUTPUT
            echo "📋 Flow: release/* → main"
          else
            echo "target=" >> $GITHUB_OUTPUT
            echo "⚠️ Unknown branch type: $BRANCH"
          fi
          echo "✅ Branch detection complete"

  create-pr:
    name: Create PR
    needs: detect-branch
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && needs.detect-branch.outputs.target != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 🔍 Check existing PR
        id: check
        run: |
          SOURCE=${{ needs.detect-branch.outputs.source }}
          TARGET=${{ needs.detect-branch.outputs.target }}

          echo "🔍 Checking for existing PR: $SOURCE → $TARGET"

          # Check if PR already exists
          PR=$(gh pr list --base "$TARGET" --head "$SOURCE" --state all --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR" ]; then
            echo "⚠️ PR #$PR already exists for $SOURCE → $TARGET"
            echo "pr_number=$PR" >> $GITHUB_OUTPUT
          else
            echo "✅ No existing PR found"
            echo "pr_number=" >> $GITHUB_OUTPUT
          fi

      - name: 📝 Create PR
        if: needs.detect-branch.outputs.target != '' && steps.check.outputs.pr_number == ''
        id: create
        run: |
          SOURCE=${{ needs.detect-branch.outputs.source }}
          TARGET=${{ needs.detect-branch.outputs.target }}

          echo "📝 Creating PR: $SOURCE → $TARGET"

          # Determine title and body
          if [[ "$SOURCE" == feature/* ]]; then
            TITLE="Feature: ${SOURCE#feature/}"
            BODY="Automated PR from feature branch to $TARGET."
          elif [[ "$SOURCE" == "develop" ]]; then
            TITLE="Promote to Release"
            BODY="Automated PR from $SOURCE to release (staging)."
          elif [[ "$SOURCE" == release/* ]]; then
            TITLE="Promote to Main"
            BODY="Automated PR from $SOURCE to main (producao)."
          else
            TITLE="Promote: $SOURCE → $TARGET"
            BODY="Automated PR from $SOURCE to $TARGET."
          fi

          # Create PR
          if gh pr create --base "$TARGET" --head "$SOURCE" --title "$TITLE" --body "$BODY" 2>/dev/null; then
            PR_NUM=$(gh pr list --head "$SOURCE" --base "$TARGET" --json number -q '.[0].number')
            echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
          else
            echo "No changes to create PR"
            echo "pr_number=" >> $GITHUB_OUTPUT
          fi

      - name: Add Labels
        if: needs.detect-branch.outputs.is_feature == 'true'
        run: |
          PR=${{ steps.check.outputs.pr_number }}
          if [ -n "$PR" ]; then
            gh pr edit "$PR" --add-label auto-merge 2>/dev/null || true
          fi

  auto-merge-feature:
    name: Auto Merge
    needs: [detect-branch, create-pr]
    runs-on: ubuntu-latest
    if: needs.detect-branch.outputs.is_feature == 'true' && needs.create-pr.outputs.pr_number != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github

      - name: 🔄 Enable Auto Merge
        run: |
          PR=${{ needs.create-pr.outputs.pr_number }}
          echo "🔄 Attempting auto-merge for PR #$PR..."

          # Retry auto-merge
          for i in {1..3}; do
            echo "Attempt $i/3..."
            if gh pr merge "$PR" --auto --squash --delete-branch 2>/dev/null; then
              echo "✅ Auto-merge enabled for PR #$PR"
              break
            else
              echo "⚠️ Attempt $i failed"
              if [ $i -lt 3 ]; then
                echo "⏳ Waiting 5 seconds before retry..."
                sleep 5
              fi
            fi
          done

          # Verify merge status
          MERGEABLE=$(gh pr view $PR --json mergeable -q '.mergeable' 2>/dev/null || echo "unknown")
          echo "📊 Mergeable status: $MERGEABLE"

  summary:
    name: Summary
    needs: [detect-branch, create-pr]
    if: github.event_name == 'workflow_dispatch' && always()
    runs-on: ubuntu-latest

    steps:
      - name: Summary
        run: |
          echo "## PR Flow Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Detect | ${{ needs.detect-branch.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Create PR | ${{ needs.create-pr.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.detect-branch.outputs.is_feature }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔄 Auto-merge enabled for feature → develop" >> $GITHUB_STEP_SUMMARY
          fi
