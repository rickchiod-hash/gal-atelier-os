name: CI/CD

on:
  pull_request:
    branches: [dev, hom, main]
  push:
    branches: [dev, hom, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: galatelier
          POSTGRES_PASSWORD: galatelier123
          POSTGRES_DB: galatelier
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: 🚀 Start Backend in background
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/galatelier
          DATABASE_USERNAME: galatelier
          DATABASE_PASSWORD: galatelier123
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/galatelier
          SPRING_DATASOURCE_USERNAME: galatelier
          SPRING_DATASOURCE_PASSWORD: galatelier123
        run: |
          mvn test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-logs
          path: backend/logs/
          retention-days: 7

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
