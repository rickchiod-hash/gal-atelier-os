name: Docker • Build & Push

on:
  push:
    branches:
      - dev
      - homolog
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - dev
      - homolog

env:
  REGISTRY: ghcr.io
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  docker-build-backend:
    name: Docker • Backend Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔐 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: 🏗️ Build & Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache,mode=max

      - name: ✅ Image Summary
        run: |
          echo "Backend Image Built"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  docker-build-frontend:
    name: Docker • Frontend Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔐 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: 🏗️ Build & Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://backend:8080
            NEXT_PUBLIC_WHATSAPP_RECEIVER=5511914136961
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:buildcache,mode=max

      - name: ✅ Image Summary
        run: |
          echo "Frontend Image Built"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  docker-compose-test:
    name: Docker • Compose Validation
    runs-on: ubuntu-latest
    needs: [docker-build-backend, docker-build-frontend]
    if: github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐳 Validate Docker Compose
        run: |
          echo "🔍 Validating docker-compose.yml..."
          docker-compose config > /dev/null
          echo "✅ Docker Compose is valid"

      - name: 🧪 Test Docker Compose Build
        run: |
          echo "🏗️ Building with docker-compose..."
          docker-compose build --no-cache postgres backend frontend
          echo "✅ Docker Compose build successful"

      - name: 📊 Docker Image Info
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          docker image ls --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

