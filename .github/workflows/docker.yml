name: Docker • Build & Push (Legacy Manual)

on:
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to GHCR"
        required: true
        type: boolean
        default: false
      run_compose_validation:
        description: "Run docker compose validation/build"
        required: true
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  docker-build-backend:
    if: github.event_name == 'workflow_dispatch'
    name: Docker • Backend Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔐 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: 🏗️ Build & Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: ${{ github.event.inputs.push_images == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache,mode=max

      - name: ⏳ Wait for Image Availability
        if: github.event_name == 'push'
        run: |
          echo "⏳ Waiting for backend image to be available in registry..."
          TAGS="${{ steps.meta.outputs.tags }}"
          for i in {1..10}; do
            echo "⏳ Attempt $i/10: Checking image availability..."
            # Extract first tag
            TAG=$(echo "$TAGS" | head -1)
            if docker manifest inspect "$TAG" > /dev/null 2>&1; then
              echo "✅ Backend image available: $TAG"
              break
            fi
            sleep 3
          done

      - name: ✅ Image Summary
        run: |
          echo "✅ Backend Image Built"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  docker-build-frontend:
    if: github.event_name == 'workflow_dispatch'
    name: Docker • Frontend Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔐 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: 🏗️ Build & Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: ${{ github.event.inputs.push_images == 'true' }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://backend:8080
            NEXT_PUBLIC_WHATSAPP_RECEIVER=5511914136961
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/frontend:buildcache,mode=max

      - name: ⏳ Wait for Image Availability
        if: github.event_name == 'push'
        run: |
          echo "⏳ Waiting for frontend image to be available in registry..."
          TAGS="${{ steps.meta.outputs.tags }}"
          for i in {1..10}; do
            echo "⏳ Attempt $i/10: Checking image availability..."
            # Extract first tag
            TAG=$(echo "$TAGS" | head -1)
            if docker manifest inspect "$TAG" > /dev/null 2>&1; then
              echo "✅ Frontend image available: $TAG"
              break
            fi
            sleep 3
          done

      - name: ✅ Image Summary
        run: |
          echo "✅ Frontend Image Built"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  docker-compose-test:
    name: Docker • Compose Validation
    runs-on: ubuntu-latest
    needs: [docker-build-backend, docker-build-frontend]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_compose_validation == 'true'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐳 Validate Docker Compose
        run: |
          echo "🔍 Validating docker-compose.yml..."
          if docker-compose config > /dev/null 2>&1; then
            echo "✅ Docker Compose is valid"
          else
            echo "❌ Docker Compose validation failed"
            docker-compose config
            exit 1
          fi

      - name: 🧪 Test Docker Compose Build
        run: |
          echo "🏗️ Building with docker-compose..."
          echo "Building postgres..."
          docker-compose build --no-cache postgres
          echo "✅ Postgres built"

          echo "Building backend..."
          docker-compose build --no-cache backend
          echo "✅ Backend built"

          echo "Building frontend..."
          docker-compose build --no-cache frontend
          echo "✅ Frontend built"

          echo "✅ Docker Compose build successful"

      - name: 📊 Docker Image Info
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          docker image ls --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
