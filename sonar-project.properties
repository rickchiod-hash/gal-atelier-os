sonar.projectKey=gal-atelier-os
sonar.projectName=Gal Atelier OS
sonar.projectVersion=0.5.0
sonar.sourceEncoding=UTF-8

# Backend
sonar.sources=backend/src/main
sonar.tests=backend/src/test
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes
sonar.java.libraries=backend/target/dependency

# Frontend
sonar.sources=frontend/app,frontend/components
sonar.tests=frontend/__tests__

# Coverage
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# Exclude patterns
sonar.exclusions=\
  **/target/**,\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**

# Code smells severity
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=common-java:InsufficientCommentDensity
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*

# Optional: Quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=600

